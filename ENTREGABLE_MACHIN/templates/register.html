<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | NovaNotifi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060c1a;
      --surface:  #0d1526;
      --surface2: #111827;
      --border:   rgba(255,255,255,0.07);
      --bh:       rgba(255,255,255,0.15);
      --accent:   #1a56db;
      --accent2:  #60a5fa;
      --text:     #e2e8f0;
      --muted:    #334155;
      --muted2:   #475569;
      --err:      #f87171;
      --err-bg:   rgba(220,38,38,0.08);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,86,219,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,86,219,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -180px; right: -180px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(26,86,219,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      width: 300px; height: 300px;
      bottom: -120px; left: -80px;
      background: radial-gradient(circle, rgba(26,86,219,0.1) 0%, transparent 70%);
      animation: nnFloat 7s ease-in-out infinite;
    }

    .orb-2 {
      width: 150px; height: 150px;
      top: 10%; left: 15%;
      background: radial-gradient(circle, rgba(147,197,253,0.07) 0%, transparent 70%);
      animation: nnFloat 10s ease-in-out infinite reverse;
    }

    @keyframes nnFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-20px); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      animation: nnUp 0.5s ease both;
    }

    @keyframes nnUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .reg-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.4rem;
    }

    .reg-logo-icon {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(26,86,219,0.4);
    }

    .reg-logo-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.3px;
    }

    .reg-logo-name span { color: var(--accent2); }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(26,86,219,0.15);
      border: 1px solid rgba(26,86,219,0.35);
      border-radius: 999px;
      padding: 5px 13px;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 1.1rem;
    }

    .badge-dot {
      width: 6px; height: 6px;
      background: #60a5fa;
      border-radius: 50%;
      animation: nnBlink 2s ease infinite;
    }

    @keyframes nnBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 38px;
      font-weight: 800;
      color: white;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    h1 em {
      font-style: normal;
      color: var(--accent2);
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted2);
      margin-bottom: 1.8rem;
      line-height: 1.6;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.75rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(26,86,219,0.5), transparent);
    }

    .field { margin-bottom: 1.1rem; }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
      font-family: 'Syne', sans-serif;
    }

    .input-wrap { position: relative; }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      height: 48px;
      padding: 0 46px 0 15px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      margin-top: 0;
    }

    input::placeholder { color: #1e2d45; }

    input:hover { border-color: var(--bh); }

    input:focus {
      border-color: rgba(26,86,219,0.7);
      background: #0f1c33;
      box-shadow: 0 0 0 4px rgba(26,86,219,0.1);
    }

    .input-icon {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .eye-toggle {
      position: absolute;
      right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      display: flex;
      transition: color 0.15s;
    }

    .eye-toggle:hover { color: #94a3b8; }

    /* Strength */
    .strength-wrap {
      display: flex;
      gap: 5px;
      align-items: center;
      margin-top: 7px;
    }

    .strength-bars { display: flex; gap: 4px; flex: 1; }

    .strength-bar {
      flex: 1;
      height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,0.06);
      transition: background 0.3s;
    }

    .strength-label {
      font-size: 11px;
      color: var(--muted);
      min-width: 48px;
      text-align: right;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.04em;
      transition: color 0.3s;
    }

    /* Error */
    .error-box {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      background: var(--err-bg);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: 10px;
      padding: 11px 13px;
      margin-bottom: 1.1rem;
      font-size: 13px;
      color: var(--err);
      line-height: 1.5;
    }

    .error-box svg { flex-shrink: 0; margin-top: 1px; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0 1.25rem;
    }

    .divider-line { flex: 1; height: 1px; background: var(--border); }

    .divider-text {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-family: 'Syne', sans-serif;
    }

    /* Button */
    .btn {
      width: 100%;
      height: 50px;
      background: var(--accent);
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(26,86,219,0.3);
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }

    .btn:hover {
      background: #1e40af;
      transform: translateY(-1px);
      box-shadow: 0 8px 26px rgba(26,86,219,0.4);
    }

    .btn:active { transform: translateY(0) scale(0.99); }

    /* Terms */
    .terms {
      font-size: 11px;
      color: #1e2d45;
      text-align: center;
      margin-top: 1rem;
      line-height: 1.6;
    }

    .terms a { color: var(--muted); text-decoration: underline; }

    /* Login link */
    .login-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 1.4rem;
    }

    .login-link a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    .login-link a:hover { opacity: 0.75; }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">

  <div class="reg-logo">
    <div class="reg-logo-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        <circle cx="18" cy="5" r="3" fill="#60a5fa" stroke="none"/>
      </svg>
    </div>
    <span class="reg-logo-name">Nova<span>Notifi</span></span>
  </div>

  <div class="badge">
    <span class="badge-dot"></span>
    Nueva cuenta
  </div>

  <h1>Únete a<br><em>NovaNotifi.</em></h1>
  <p class="subtitle">Gestiona trámites y notificaciones en segundos.</p>

  <div class="card">

    {% if error %}
    <div class="error-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">

      <div class="field">
        <label>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Correo electrónico
        </label>
        <div class="input-wrap">
          <input type="email" name="correo" placeholder="tu@novanotifi.com" required autocomplete="email">
          <span class="input-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </span>
        </div>
      </div>

      <div class="field">
        <label>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Contraseña
        </label>
        <div class="input-wrap">
          <input type="password" name="password" id="pwd" placeholder="Mínimo 8 caracteres" required autocomplete="new-password">
          <button type="button" class="eye-toggle" id="eyeBtn" aria-label="Mostrar contraseña">
            <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-wrap">
          <div class="strength-bars">
            <div class="strength-bar" id="b1"></div>
            <div class="strength-bar" id="b2"></div>
            <div class="strength-bar" id="b3"></div>
            <div class="strength-bar" id="b4"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">todo listo</span>
        <div class="divider-line"></div>
      </div>

      <button type="submit" class="btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Crear cuenta
      </button>

    </form>

    <p class="terms">
      Al registrarte aceptas los <a href="#">Términos de uso</a> y la <a href="#">Política de privacidad</a>.
    </p>
  </div>

  <p class="login-link">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión →</a></p>

</div>

<script>
  const pwdInput = document.getElementById('pwd');
  const eyeBtn  = document.getElementById('eyeBtn');
  const eyeIcon = document.getElementById('eyeIcon');

  eyeBtn.addEventListener('click', () => {
    const show = pwdInput.type === 'password';
    pwdInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
  });

  const bars  = ['b1','b2','b3','b4'].map(id => document.getElementById(id));
  const label = document.getElementById('strengthLabel');
  const lvls  = [
    { c: '#f87171', t: 'Débil'   },
    { c: '#fb923c', t: 'Regular' },
    { c: '#60a5fa', t: 'Buena'   },
    { c: '#34d399', t: 'Fuerte'  },
  ];

  pwdInput.addEventListener('input', () => {
    const v = pwdInput.value;
    let s = 0;
    if (v.length >= 6) s++;
    if (v.length >= 10) s++;
    if (/[A-Z]/.test(v) && /[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v) && v.length >= 8) s++;
    bars.forEach((b, i) => {
      b.style.background = i < s ? lvls[Math.min(s-1,3)].c : 'rgba(255,255,255,0.06)';
    });
    if (!v.length) { label.textContent = ''; return; }
    const l = lvls[Math.min(s-1,3)] || lvls[0];
    label.textContent = l.t;
    label.style.color = l.c;
  });
</script>

</body>
</html>
